# Laptop-scale ELF run: tiny model, tiny TinyStories slice, short sequences.
# Train target: a few thousand steps in minutes-to-tens-of-minutes on CPU.

# Dataset (local, produced by scripts/prepare_tinystories.py)
data_path: "../data/tinystories_t5/train"
# Unconditional eval; ELF infers cond vs uncond from eval_data_path presence.
# Set to null so the trainer uses test_generation_uncond.
eval_data_path: null
max_length: 64
pad_token: "eos"  # T5 tokenizer has no pad token by default; use eos

# Encoder (still T5-small; pulled from HF by ELF authors)
encoder_model_name: t5-small
encoder_checkpoint: "embedded-language-flows/t5_small_encoder_jax/t5_small_encoder_jax.pkl"
latent_mean: 0.0
latent_std: 0.2

# Model architecture (tiny variant added to modules/model.py)
model: ELF-T
bottleneck_dim: 64
num_time_tokens: 2
num_self_cond_cfg_tokens: 2
num_model_mode_tokens: 2

# Denoiser objective
denoiser_p_mean: -1.5
denoiser_p_std: 0.8
denoiser_noise_scale: 2.0
t_eps: 0.05
time_schedule: "logit_normal"

# Decoder objective
decoder_prob: 0.2
decoder_noise_scale: 5.0
decoder_p_mean: 0.8
decoder_p_std: 0.8

# Conditioning / CFG
self_cond_prob: 0.5

# Training (optimizer + schedule)
epochs: 20
global_batch_size: 8
# blr scales LR by batch_size/256, so at batch 8 we need a much larger blr
# to get a workable LR. blr=0.02 -> lr ~6.25e-4 which is healthy for AdamW.
blr: 0.02
weight_decay: 0.0
warmup_epochs: 0.5
warmup_steps: -1
optimizer: adamw  # Muon is slower to compile and overkill at this scale

# EMA
ema_decay1: 0.999

# Sampling
sampling_configs_path: "configs/sampling_configs/laptop_sampling_configs.yml"
num_samples: 8

# Online PPL eval pulls gpt2-large; way too heavy for a laptop. Disable.
online_eval: false

# Logging & Checkpointing
log_freq: 50
save_freq: 5  # Save every 5 epochs (instead of every epoch)
eval_freq: 5  # Sample every 5 epochs

# Output
output_dir: "../outputs/elf_t-tinystories"
hf_repo_id: null
resume: null

# Wandb
use_wandb: false
wandb_project: elf
wandb_entity: null
wandb_run_name: elf_t-tinystories

# Misc
seed: 42
